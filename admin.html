<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MedShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue: #007bff;
            --blue-dark: #0056b3;
            --blue-light: #e8f4ff;
            --green: #28a745;
            --red: #dc3545;
            --orange: #fd7e14;
            --text: #1a1a2e;
            --muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f4f7fb;
            --white: #fff;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); }

        /* ── AUTH GUARD ── */
        #authGuard {
            position: fixed; inset: 0;
            background: var(--white);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            flex-direction: column; gap: 16px;
        }
        #authGuard .spinner {
            width: 48px; height: 48px;
            border: 5px solid var(--blue-light);
            border-top: 5px solid var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── HEADER ── */
        header {
            background: var(--white);
            border-bottom: 2px solid var(--blue-light);
            padding: 0 30px;
            height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 12px rgba(0,123,255,0.08);
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .logo { font-size: 1.3rem; font-weight: 800; color: var(--blue); }
        .logo span { color: var(--green); }
        .admin-badge {
            background: var(--blue-light);
            color: var(--blue);
            font-size: 0.75rem; font-weight: 800;
            padding: 4px 10px; border-radius: 20px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .user-info { display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--muted); font-size: 0.9rem; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--blue-light); }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--muted); }
        .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
        .btn-danger { background: var(--red); color: white; }
        .btn-danger:hover { background: #b02a37; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-primary:hover { background: var(--blue-dark); }
        .btn-success { background: var(--green); color: white; }
        .btn-success:hover { background: #1e7e34; }

        /* ── LAYOUT ── */
        .page-content { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

        /* ── STATS ── */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .stat-card {
            background: var(--white);
            border-radius: 16px;
            padding: 22px;
            box-shadow: var(--shadow);
            display: flex; align-items: center; gap: 16px;
            border-left: 4px solid var(--blue);
        }
        .stat-card.green { border-left-color: var(--green); }
        .stat-card.orange { border-left-color: var(--orange); }
        .stat-icon {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }
        .stat-icon.blue { background: var(--blue-light); color: var(--blue); }
        .stat-icon.green { background: #d1fae5; color: #065f46; }
        .stat-icon.orange { background: #fff3e0; color: #e65100; }
        .stat-info p { font-size: 0.8rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-info h3 { font-size: 1.9rem; font-weight: 800; color: var(--text); line-height: 1.1; }
        .stat-info span { font-size: 0.8rem; color: var(--muted); }

        /* ── PANELS ── */
        .panel { background: var(--white); border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 28px; overflow: hidden; }
        .panel-header {
            padding: 22px 28px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px;
        }
        .panel-title { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 800; color: var(--text); }
        .panel-title i { color: var(--blue); font-size: 1.2rem; }
        .panel-body { padding: 28px; }

        /* ── FORM ── */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full { grid-column: 1 / -1; }
        label { font-size: 0.85rem; font-weight: 800; color: var(--text); }
        label i { color: var(--blue); margin-right: 4px; }
        input[type="text"],
        input[type="number"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--white);
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        textarea { resize: vertical; min-height: 100px; }

        .image-upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .image-upload-zone:hover { border-color: var(--blue); background: var(--blue-light); }
        .image-upload-zone i { font-size: 2rem; color: var(--muted); display: block; margin-bottom: 8px; }
        .image-upload-zone p { font-size: 0.85rem; color: var(--muted); font-weight: 700; }

        #imagePreview { margin-top: 14px; display: none; }
        #imagePreview img { max-width: 160px; max-height: 160px; object-fit: cover; border-radius: 12px; border: 2px solid var(--border); }

        .form-actions { display: flex; gap: 12px; margin-top: 24px; }
        .form-actions .btn { flex: 1; justify-content: center; padding: 13px; font-size: 1rem; }

        /* ── FILTERS ── */
        .filters {
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .filters input, .filters select {
            flex: 1; min-width: 180px;
            padding: 10px 14px;
        }

        /* ── PRODUCT GRID ── */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; margin-top: 24px; }

        .product-card {
            border: 2px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.25s;
            position: relative;
        }
        .product-card:hover { border-color: var(--blue); box-shadow: 0 8px 24px rgba(0,123,255,0.12); transform: translateY(-2px); }
        .product-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--blue), var(--green));
        }
        .product-card img { width: 100%; height: 180px; object-fit: cover; }
        .product-card-body { padding: 16px; }
        .product-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
        .product-card-top h3 { font-size: 1rem; font-weight: 800; color: var(--text); flex: 1; }
        .category-pill {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem; font-weight: 800;
            text-transform: uppercase; flex-shrink: 0;
        }
        .cat-savon  { background: #dbeafe; color: #1e40af; }
        .cat-poudre { background: #fef3c7; color: #92400e; }
        .cat-pomade { background: #dcfce7; color: #166534; }
        .cat-autre  { background: #f3e8ff; color: #6b21a8; }

        .product-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .product-price { font-size: 1.2rem; font-weight: 800; color: var(--green); }
        .stock-pill { font-size: 0.78rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
        .stock-ok  { background: #d1fae5; color: #065f46; }
        .stock-low { background: #fef3c7; color: #92400e; }
        .stock-out { background: #fee2e2; color: #991b1b; }

        .product-actions { display: flex; gap: 8px; }
        .product-actions .btn { flex: 1; justify-content: center; padding: 9px; font-size: 0.85rem; }
        .btn-edit { background: var(--blue-light); color: var(--blue); border: none; }
        .btn-edit:hover { background: var(--blue); color: white; }
        .btn-del  { background: #fee2e2; color: var(--red); border: none; }
        .btn-del:hover  { background: var(--red); color: white; }

        /* ── EMPTY STATE ── */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
        .empty-state i { font-size: 4rem; opacity: 0.3; display: block; margin-bottom: 16px; }
        .empty-state p { font-size: 1rem; font-weight: 700; }

        /* ── MODAL ÉDITION ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--white);
            border-radius: 20px;
            width: 100%; max-width: 620px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-header {
            padding: 22px 28px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-header h2 { font-size: 1.1rem; font-weight: 800; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--muted); line-height: 1; }
        .modal-close:hover { color: var(--red); }
        .modal-body { padding: 28px; }

        /* ── TOAST ── */
        .toast {
            position: fixed; top: 80px; right: 20px;
            padding: 14px 20px;
            border-radius: 12px;
            color: white; font-family: 'Nunito', sans-serif;
            font-size: 0.95rem; font-weight: 700;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            z-index: 9999;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            max-width: 340px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: var(--green); }
        .toast.error   { background: var(--red); }

        @media (max-width: 640px) {
            .form-grid { grid-template-columns: 1fr; }
            .header-right .user-info { display: none; }
            .panel-body { padding: 18px; }
        }
    </style>
</head>
<body>

<!-- Auth guard (masque la page pendant la vérif) -->
<div id="authGuard">
    <div class="spinner"></div>
    <p style="font-family:'Nunito',sans-serif;font-weight:700;color:#6b7280">Vérification de l'accès...</p>
</div>

<header>
    <div class="header-left">
        <div class="logo">Med<span>Shop</span></div>
        <span class="admin-badge"><i class="fa-solid fa-shield-halved"></i> Admin</span>
    </div>
    <div class="header-right">
        <div class="user-info" id="userInfo"></div>
        <a href="index.html" class="btn btn-outline"><i class="fa-solid fa-eye"></i> Voir le site</a>
        <button class="btn btn-danger" onclick="logoutUser()"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
    </div>
</header>

<div class="page-content">

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon blue"><i class="fa-solid fa-box"></i></div>
            <div class="stat-info">
                <p>Total produits</p>
                <h3 id="statTotal">0</h3>
            </div>
        </div>
        <div class="stat-card green">
            <div class="stat-icon green"><i class="fa-solid fa-chart-line"></i></div>
            <div class="stat-info">
                <p>Prix moyen</p>
                <h3 id="statAvg">0</h3>
                <span>FCFA</span>
            </div>
        </div>
        <div class="stat-card orange">
            <div class="stat-icon orange"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <div class="stat-info">
                <p>Stock faible</p>
                <h3 id="statLow">0</h3>
                <span>produits ≤ 10</span>
            </div>
        </div>
    </div>

    <!-- Formulaire ajout -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title"><i class="fa-solid fa-plus-circle"></i> Ajouter un produit</div>
        </div>
        <div class="panel-body">
            <form id="addForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label><i class="fa-solid fa-tag"></i>Nom du produit</label>
                        <input type="text" id="pName" placeholder="Ex: Savon médical Aloe Vera" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-money-bill"></i>Prix (FCFA)</label>
                        <input type="number" id="pPrice" placeholder="2500" min="0" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-layer-group"></i>Catégorie</label>
                        <select id="pCategory" required>
                            <option value="">Sélectionnez une catégorie</option>
                            <option value="savon">Savon</option>
                            <option value="poudre">Poudre médicale</option>
                            <option value="pomade">Pomade</option>
                            <option value="autre">Autre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-boxes-stacked"></i>Stock disponible</label>
                        <input type="number" id="pStock" placeholder="50" min="0" required>
                    </div>
                    <div class="form-group full">
                        <label><i class="fa-solid fa-align-left"></i>Description</label>
                        <textarea id="pDesc" placeholder="Décrivez les bienfaits et utilisations du produit..." required></textarea>
                    </div>
                    <div class="form-group full">
                        <label><i class="fa-solid fa-image"></i>Image du produit</label>
                        <label class="image-upload-zone" for="pImageFile">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <p>Cliquez pour choisir une image</p>
                            <p style="font-size:0.75rem;margin-top:4px;opacity:0.7">ou collez une URL ci-dessous</p>
                        </label>
                        <input type="file" id="pImageFile" accept="image/*" style="display:none" onchange="previewImage(event, 'addPreview', 'addPreviewImg')">
                        <input type="url" id="pImageUrl" placeholder="https://exemple.com/image.jpg" style="margin-top:10px" oninput="previewUrl(this.value, 'addPreview', 'addPreviewImg')">
                        <div id="addPreview" style="display:none;margin-top:12px">
                            <img id="addPreviewImg" src="" alt="Aperçu" style="max-width:160px;max-height:160px;object-fit:cover;border-radius:12px;border:2px solid #e5e7eb">
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="addBtn">
                        <i class="fa-solid fa-plus"></i> Ajouter le produit
                    </button>
                    <button type="button" class="btn btn-outline" onclick="resetAddForm()">
                        <i class="fa-solid fa-rotate-left"></i> Réinitialiser
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Liste des produits -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title"><i class="fa-solid fa-list"></i> Produits (<span id="countLabel">0</span>)</div>
            <div class="filters">
                <input type="text" id="searchInput" placeholder="🔍 Rechercher..." oninput="applyFilters()">
                <select id="catFilter" onchange="applyFilters()">
                    <option value="">Toutes catégories</option>
                    <option value="savon">Savon</option>
                    <option value="poudre">Poudre médicale</option>
                    <option value="pomade">Pomade</option>
                    <option value="autre">Autre</option>
                </select>
            </div>
        </div>
        <div class="panel-body" style="padding-top:0">
            <div class="products-grid" id="productsList"></div>
            <div class="empty-state" id="emptyState" style="display:none">
                <i class="fa-solid fa-box-open"></i>
                <p>Aucun produit trouvé</p>
            </div>
        </div>
    </div>

</div>

<!-- Modal édition -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header">
            <h2><i class="fa-solid fa-pen-to-square" style="color:var(--blue)"></i> Modifier le produit</h2>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="editForm">
                <input type="hidden" id="eId">
                <div class="form-grid">
                    <div class="form-group">
                        <label><i class="fa-solid fa-tag"></i>Nom du produit</label>
                        <input type="text" id="eName" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-money-bill"></i>Prix (FCFA)</label>
                        <input type="number" id="ePrice" min="0" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-layer-group"></i>Catégorie</label>
                        <select id="eCategory" required>
                            <option value="savon">Savon</option>
                            <option value="poudre">Poudre médicale</option>
                            <option value="pomade">Pomade</option>
                            <option value="autre">Autre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-boxes-stacked"></i>Stock</label>
                        <input type="number" id="eStock" min="0" required>
                    </div>
                    <div class="form-group full">
                        <label><i class="fa-solid fa-align-left"></i>Description</label>
                        <textarea id="eDesc" required></textarea>
                    </div>
                    <div class="form-group full">
                        <label><i class="fa-solid fa-image"></i>URL de l'image</label>
                        <input type="url" id="eImageUrl" oninput="previewUrl(this.value, 'editPreview', 'editPreviewImg')">
                        <div id="editPreview" style="margin-top:12px">
                            <img id="editPreviewImg" src="" alt="Aperçu" style="max-width:140px;max-height:140px;object-fit:cover;border-radius:12px;border:2px solid #e5e7eb">
                        </div>
                    </div>
                </div>
                <div class="form-actions" style="margin-top:20px">
                    <button type="submit" class="btn btn-success"><i class="fa-solid fa-check"></i> Enregistrer</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Annuler</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut }
                                from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot }
                                from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { getStorage, ref, uploadBytes, getDownloadURL }
                                from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';

    // ════════════════════════════════════════════════
    // 🔧 VOTRE CONFIGURATION FIREBASE
    // ════════════════════════════════════════════════
    const firebaseConfig = {
        apiKey:            "VOTRE_API_KEY",
        authDomain:        "VOTRE_PROJECT_ID.firebaseapp.com",
        projectId:         "VOTRE_PROJECT_ID",
        storageBucket:     "VOTRE_PROJECT_ID.appspot.com",
        messagingSenderId: "VOTRE_MESSAGING_SENDER_ID",
        appId:             "VOTRE_APP_ID"
    };

    // 🔧 MÊME LISTE QUE login.html
    const AUTHORIZED_EMAILS = [
        "votre.email@gmail.com"
    ];
    // ════════════════════════════════════════════════

    const app     = initializeApp(firebaseConfig);
    const auth    = getAuth(app);
    const db      = getFirestore(app);
    const storage = getStorage(app);

    let allProducts    = [];
    let currentFile    = null;
    let currentEditId  = null;

    // ── AUTH GUARD ──────────────────────────────────
    onAuthStateChanged(auth, (user) => {
        if (!user || !AUTHORIZED_EMAILS.includes(user.email)) {
            window.location.href = 'login.html';
            return;
        }
        document.getElementById('authGuard').style.display = 'none';
        const info = document.getElementById('userInfo');
        info.innerHTML = `
            ${user.photoURL ? `<img src="${esc(user.photoURL)}" class="user-avatar" alt="Avatar">` : ''}
            <span>${esc(user.displayName || user.email)}</span>
        `;
    });

    // ── TEMPS RÉEL FIRESTORE ────────────────────────
    const q = query(collection(db, 'products'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snap) => {
        allProducts = [];
        snap.forEach(d => allProducts.push({ id: d.id, ...d.data() }));
        updateStats();
        applyFilters();
    });

    // ── STATS ───────────────────────────────────────
    function updateStats() {
        document.getElementById('statTotal').textContent = allProducts.length;
        const avg = allProducts.length
            ? Math.round(allProducts.reduce((s, p) => s + p.price, 0) / allProducts.length)
            : 0;
        document.getElementById('statAvg').textContent = avg.toLocaleString('fr-FR');
        document.getElementById('statLow').textContent = allProducts.filter(p => p.stock <= 10).length;
    }

    // ── AFFICHAGE ───────────────────────────────────
    window.applyFilters = function () {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const cat    = document.getElementById('catFilter').value;
        const list   = allProducts.filter(p =>
            (!search || p.name.toLowerCase().includes(search) || p.description.toLowerCase().includes(search)) &&
            (!cat || p.category === cat)
        );
        renderProducts(list);
    };

    function renderProducts(list) {
        const grid  = document.getElementById('productsList');
        const empty = document.getElementById('emptyState');
        document.getElementById('countLabel').textContent = list.length;

        if (list.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        const stockClass = s => s > 10 ? 'stock-ok' : s > 0 ? 'stock-low' : 'stock-out';
        const stockText  = s => s > 10 ? `En stock (${s})` : s > 0 ? `Stock faible (${s})` : 'Rupture';

        grid.innerHTML = list.map(p => `
            <div class="product-card">
                <img src="${esc(p.imageUrl)}" alt="${esc(p.name)}" onerror="this.src='https://placehold.co/400x180?text=Image'">
                <div class="product-card-body">
                    <div class="product-card-top">
                        <h3>${esc(p.name)}</h3>
                        <span class="category-pill cat-${esc(p.category)}">${esc(p.category)}</span>
                    </div>
                    <p class="product-desc">${esc(p.description)}</p>
                    <div class="product-meta">
                        <span class="product-price">${Number(p.price).toLocaleString('fr-FR')} FCFA</span>
                        <span class="stock-pill ${stockClass(p.stock)}">${stockText(p.stock)}</span>
                    </div>
                    <div class="product-actions">
                        <button class="btn btn-edit" onclick="openEdit('${esc(p.id)}')"><i class="fa-solid fa-pen"></i> Modifier</button>
                        <button class="btn btn-del"  onclick="deleteProduct('${esc(p.id)}')"><i class="fa-solid fa-trash"></i> Supprimer</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ── AJOUT PRODUIT ───────────────────────────────
    document.getElementById('addForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('addBtn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Ajout...';
        btn.disabled = true;

        try {
            let imageUrl = document.getElementById('pImageUrl').value.trim();
            if (currentFile) {
                const sRef = ref(storage, `products/${Date.now()}_${currentFile.name}`);
                await uploadBytes(sRef, currentFile);
                imageUrl = await getDownloadURL(sRef);
            }

            await addDoc(collection(db, 'products'), {
                name:        document.getElementById('pName').value.trim(),
                price:       parseInt(document.getElementById('pPrice').value),
                category:    document.getElementById('pCategory').value,
                stock:       parseInt(document.getElementById('pStock').value),
                description: document.getElementById('pDesc').value.trim(),
                imageUrl:    imageUrl || 'https://placehold.co/400x300?text=Produit',
                createdAt:   new Date().toISOString(),
                updatedAt:   new Date().toISOString()
            });

            showToast('Produit ajouté avec succès !', 'success');
            resetAddForm();
        } catch (err) {
            console.error(err);
            showToast('Erreur lors de l\'ajout', 'error');
        } finally {
            btn.innerHTML = '<i class="fa-solid fa-plus"></i> Ajouter le produit';
            btn.disabled = false;
        }
    });

    window.resetAddForm = function () {
        document.getElementById('addForm').reset();
        document.getElementById('addPreview').style.display = 'none';
        currentFile = null;
    };

    // ── SUPPRESSION ─────────────────────────────────
    window.deleteProduct = async function (id) {
        if (!confirm('Supprimer ce produit définitivement ?')) return;
        try {
            await deleteDoc(doc(db, 'products', id));
            showToast('Produit supprimé', 'success');
        } catch (err) {
            showToast('Erreur lors de la suppression', 'error');
        }
    };

    // ── ÉDITION ─────────────────────────────────────
    window.openEdit = function (id) {
        const p = allProducts.find(x => x.id === id);
        if (!p) return;
        currentEditId = id;
        document.getElementById('eId').value        = id;
        document.getElementById('eName').value       = p.name;
        document.getElementById('ePrice').value      = p.price;
        document.getElementById('eCategory').value   = p.category;
        document.getElementById('eStock').value      = p.stock;
        document.getElementById('eDesc').value       = p.description;
        document.getElementById('eImageUrl').value   = p.imageUrl;
        document.getElementById('editPreviewImg').src = p.imageUrl;
        document.getElementById('editModal').classList.add('open');
    };

    window.closeModal = function () {
        document.getElementById('editModal').classList.remove('open');
        currentEditId = null;
    };

    document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentEditId) return;
        const btn = e.target.querySelector('button[type="submit"]');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Enregistrement...';
        btn.disabled = true;
        try {
            await updateDoc(doc(db, 'products', currentEditId), {
                name:        document.getElementById('eName').value.trim(),
                price:       parseInt(document.getElementById('ePrice').value),
                category:    document.getElementById('eCategory').value,
                stock:       parseInt(document.getElementById('eStock').value),
                description: document.getElementById('eDesc').value.trim(),
                imageUrl:    document.getElementById('eImageUrl').value.trim(),
                updatedAt:   new Date().toISOString()
            });
            showToast('Produit mis à jour !', 'success');
            closeModal();
        } catch (err) {
            showToast('Erreur lors de la modification', 'error');
        } finally {
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Enregistrer';
            btn.disabled = false;
        }
    });

    // ── DÉCONNEXION ─────────────────────────────────
    window.logoutUser = async function () {
        if (!confirm('Se déconnecter ?')) return;
        await signOut(auth);
        window.location.href = 'login.html';
    };

    // ── UPLOAD IMAGE ─────────────────────────────────
    window.previewImage = function (event, previewDivId, previewImgId) {
        const file = event.target.files[0];
        if (!file) return;
        currentFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById(previewImgId).src = e.target.result;
            document.getElementById(previewDivId).style.display = 'block';
        };
        reader.readAsDataURL(file);
    };

    window.previewUrl = function (url, previewDivId, previewImgId) {
        if (!url) return;
        document.getElementById(previewImgId).src = url;
        document.getElementById(previewDivId).style.display = 'block';
    };

    // ── TOAST ────────────────────────────────────────
    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.className = `toast ${type} show`;
        t.innerHTML = `<i class="fa-solid fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
        setTimeout(() => t.classList.remove('show'), 3200);
    }

    // ── UTILITAIRE XSS ──────────────────────────────
    function esc(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
</script>
</body>
</html>
