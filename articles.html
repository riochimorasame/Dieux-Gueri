<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos Articles - MedShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Spinner */
        .loading-spinner {
            display: inline-block;
            width: 48px; height: 48px;
            border: 5px solid #f0f6ff;
            border-top: 5px solid #007bff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-container {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 400px; gap: 20px;
        }

        /* Badges stock */
        .stock-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.96);
            padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stock-badge.in-stock  { color: #10b981; border: 2px solid #10b981; }
        .stock-badge.low-stock { color: #f59e0b; border: 2px solid #f59e0b; }
        .stock-badge.out-of-stock { color: #ef4444; border: 2px solid #ef4444; }

        /* Badges catégorie */
        .category-badge {
            display: inline-block;
            padding: 4px 12px; border-radius: 12px;
            font-size: 12px; font-weight: 700;
            text-transform: uppercase; margin-bottom: 10px;
        }
        .category-savon  { background: #dbeafe; color: #1e40af; }
        .category-poudre { background: #fef3c7; color: #92400e; }
        .category-pomade { background: #dcfce7; color: #166534; }
        .category-autre  { background: #f3e8ff; color: #6b21a8; }

        /* Description tronquée */
        .product-description {
            font-size: 14px; color: #666; line-height: 1.6;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Barre de filtres */
        .filter-container {
            background: white;
            padding: 18px 20px;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 28px;
            display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
        }
        .filter-container select,
        .filter-container input {
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px; font-family: inherit;
            transition: border-color 0.2s;
            background: white;
        }
        .filter-container select:focus,
        .filter-container input:focus { outline: none; border-color: #007bff; }
        .filter-container button {
            padding: 10px 20px;
            background: #007bff; color: white;
            border: none; border-radius: 10px;
            cursor: pointer; font-weight: 700; font-size: 14px;
            font-family: inherit;
            transition: background 0.2s;
        }
        .filter-container button:hover { background: #0056b3; }

        /* État vide */
        .no-products { text-align: center; padding: 60px 20px; color: #6b7280; }
        .no-products i { font-size: 64px; margin-bottom: 20px; opacity: 0.3; display: block; }
        .no-products h3 { font-size: 1.1rem; margin-bottom: 8px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Votre bien-être</div>
    <nav>
        <ul>
            <li><a href="index.html"><i class="fa-solid fa-house"></i> Accueil</a></li>
            <li><a href="articles.html" class="active"><i class="fa-solid fa-bag-shopping"></i> Nos Articles</a></li>
            <li><a href="chatbot.html"><i class="fa-solid fa-robot"></i> Assistant Virtuel</a></li>
            <li><a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a></li>
        </ul>
    </nav>
</header>

<section class="products">
    <h2><i class="fa-solid fa-bag-shopping"></i> Nos Articles</h2>

    <div class="filter-container">
        <div style="flex:1;min-width:240px">
            <input type="text" id="searchInput" placeholder="🔍 Rechercher un produit..." style="width:100%" oninput="filterAndSort()">
        </div>
        <select id="categoryFilter" style="min-width:190px" onchange="filterAndSort()">
            <option value="">Toutes les catégories</option>
            <option value="savon">Savon</option>
            <option value="poudre">Poudre médicale</option>
            <option value="pomade">Pomade</option>
            <option value="autre">Autre</option>
        </select>
        <select id="sortFilter" style="min-width:190px" onchange="filterAndSort()">
            <option value="recent">Plus récents</option>
            <option value="name-asc">Nom (A→Z)</option>
            <option value="name-desc">Nom (Z→A)</option>
            <option value="price-asc">Prix croissant</option>
            <option value="price-desc">Prix décroissant</option>
        </select>
        <button onclick="resetFilters()"><i class="fa-solid fa-rotate-left"></i> Réinitialiser</button>
    </div>

    <div id="loadingContainer" class="loading-container">
        <div class="loading-spinner"></div>
        <p style="font-size:17px;color:#666;font-weight:600">Chargement des produits...</p>
    </div>

    <div class="product-list" id="productList" style="display:none"></div>

    <div id="noProducts" class="no-products" style="display:none">
        <i class="fa-solid fa-box-open"></i>
        <h3>Aucun produit trouvé</h3>
        <p>Essayez de modifier vos filtres de recherche</p>
    </div>
</section>

<button class="cart-button" id="cart-button">
    <i class="fa-solid fa-cart-shopping"></i> <span id="cart-count">0</span>
</button>

<div id="cart-modal" class="cart-modal">
    <div class="cart-modal-content">
        <span class="close-button">&times;</span>
        <h2>Votre Panier</h2>
        <ul id="cart-items"></ul>
        <div id="cart-modal-footer">
            <div id="cart-total"></div>
            <button id="checkout-button">Procéder à l'achat</button>
        </div>
    </div>
</div>

<div id="cart-notification" class="cart-notification">
    <img id="notification-img" src="" alt="Produit ajouté">
    <span id="notification-message" class="message"></span>
</div>

<footer>
    <p>&copy; 2025 MedShop | <a href="#"><i class="fa-solid fa-gavel"></i> Mentions légales</a> | <a href="#"><i class="fa-solid fa-shield-dog"></i> Politique de confidentialité</a> | <a href="contact.html">Contact</a></p>
</footer>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, query, orderBy, onSnapshot }
        from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    // ════════════════════════════════════════════════
    // 🔧 VOTRE CONFIGURATION FIREBASE
    // ════════════════════════════════════════════════
    const firebaseConfig = {
        apiKey:            "VOTRE_API_KEY",
        authDomain:        "VOTRE_PROJECT_ID.firebaseapp.com",
        projectId:         "VOTRE_PROJECT_ID",
        storageBucket:     "VOTRE_PROJECT_ID.appspot.com",
        messagingSenderId: "VOTRE_MESSAGING_SENDER_ID",
        appId:             "VOTRE_APP_ID"
    };
    // ════════════════════════════════════════════════

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    let allProducts = [];
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    // ── LIRE LE PARAMÈTRE URL ?category=... ─────────
    const urlParams    = new URLSearchParams(window.location.search);
    const categoryFromUrl = urlParams.get('category');

    // ── CHARGEMENT TEMPS RÉEL ────────────────────────
    const q = query(collection(db, 'products'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snap) => {
        allProducts = [];
        snap.forEach(d => allProducts.push({ id: d.id, ...d.data() }));

        document.getElementById('loadingContainer').style.display = 'none';
        document.getElementById('productList').style.display = 'grid';

        // Appliquer le filtre URL si présent
        if (categoryFromUrl) {
            document.getElementById('categoryFilter').value = categoryFromUrl;
        }

        filterAndSort();
    }, (err) => {
        console.error(err);
        document.getElementById('loadingContainer').innerHTML = `
            <i class="fa-solid fa-exclamation-triangle" style="font-size:48px;color:#ef4444"></i>
            <p style="color:#ef4444;font-weight:700">Erreur de chargement des produits</p>
            <p style="color:#666">Vérifiez votre configuration Firebase</p>
        `;
    });

    // ── FILTRE + TRI ─────────────────────────────────
    window.filterAndSort = function () {
        const search   = document.getElementById('searchInput').value.toLowerCase();
        const category = document.getElementById('categoryFilter').value;
        const sort     = document.getElementById('sortFilter').value;

        let list = allProducts.filter(p =>
            (!search || p.name.toLowerCase().includes(search) || p.description.toLowerCase().includes(search)) &&
            (!category || p.category === category)
        );

        switch (sort) {
            case 'name-asc':   list.sort((a, b) => a.name.localeCompare(b.name)); break;
            case 'name-desc':  list.sort((a, b) => b.name.localeCompare(a.name)); break;
            case 'price-asc':  list.sort((a, b) => a.price - b.price); break;
            case 'price-desc': list.sort((a, b) => b.price - a.price); break;
            case 'recent':     list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)); break;
        }

        displayProducts(list);
    };

    window.resetFilters = function () {
        document.getElementById('searchInput').value   = '';
        document.getElementById('categoryFilter').value = '';
        document.getElementById('sortFilter').value    = 'recent';
        filterAndSort();
    };

    // ── AFFICHAGE ────────────────────────────────────
    function displayProducts(list) {
        const grid  = document.getElementById('productList');
        const empty = document.getElementById('noProducts');

        if (!list.length) {
            grid.style.display  = 'none';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        grid.style.display  = 'grid';

        const stockClass = s => s > 10 ? 'in-stock' : s > 0 ? 'low-stock' : 'out-of-stock';
        const stockText  = s => s > 10 ? `✓ En stock (${s})` : s > 0 ? `⚠ Stock faible (${s})` : '✗ Rupture';

        grid.innerHTML = list.map(p => `
            <div class="product" data-id="${esc(p.id)}" data-name="${esc(p.name)}" data-price="${p.price}">
                <div style="position:relative">
                    <img src="${esc(p.imageUrl)}" alt="${esc(p.name)}" onerror="this.src='https://placehold.co/300x200?text=Produit'"/>
                    <span class="stock-badge ${stockClass(p.stock)}">${stockText(p.stock)}</span>
                </div>
                <span class="category-badge category-${esc(p.category)}">${esc(p.category)}</span>
                <p style="font-size:21px;font-weight:800;color:#007bff;margin:10px 0">${esc(p.name)}</p>
                <p class="product-description">${esc(p.description)}</p>
                <p style="font-size:23px;font-weight:800;color:#28a745;margin:10px 0">${Number(p.price).toLocaleString('fr-FR')} FCFA</p>
                <div class="quantity-selector">
                    <button class="decrement-btn" ${p.stock === 0 ? 'disabled' : ''}>-</button>
                    <span class="quantity-count">0</span>
                    <button class="increment-btn" ${p.stock === 0 ? 'disabled' : ''}>+</button>
                </div>
                <button class="add-to-cart" disabled ${p.stock === 0 ? 'style="background:#ccc;cursor:not-allowed"' : ''}>
                    <i class="fa-solid fa-cart-plus"></i>
                    ${p.stock === 0 ? 'Rupture de stock' : 'Ajouter au panier'}
                </button>
            </div>
        `).join('');

        attachProductEvents();
    }

    // ── ÉVÉNEMENTS PRODUITS ──────────────────────────
    function attachProductEvents() {
        document.querySelectorAll('.product').forEach(card => {
            const dec     = card.querySelector('.decrement-btn');
            const inc     = card.querySelector('.increment-btn');
            const qtySpan = card.querySelector('.quantity-count');
            const addBtn  = card.querySelector('.add-to-cart');
            const prod    = allProducts.find(p => p.id === card.dataset.id);
            const maxStock = prod ? prod.stock : 0;

            inc.addEventListener('click', () => {
                let q = parseInt(qtySpan.textContent);
                if (q < maxStock) { q++; qtySpan.textContent = q; addBtn.disabled = false; }
            });
            dec.addEventListener('click', () => {
                let q = parseInt(qtySpan.textContent);
                if (q > 0) { q--; qtySpan.textContent = q; }
                if (parseInt(qtySpan.textContent) === 0) addBtn.disabled = true;
            });
            addBtn.addEventListener('click', () => {
                const qty = parseInt(qtySpan.textContent);
                if (qty > 0 && maxStock > 0) {
                    const existing = cart.find(i => i.id === card.dataset.id);
                    if (existing) { existing.quantity += qty; }
                    else {
                        cart.push({
                            id: card.dataset.id,
                            name: card.dataset.name,
                            price: parseFloat(card.dataset.price),
                            img: card.querySelector('img').src,
                            quantity: qty
                        });
                    }
                    updateCartDisplay();
                    showNotification({ name: card.dataset.name, img: card.querySelector('img').src });
                    qtySpan.textContent = '0';
                    addBtn.disabled = true;
                }
            });
        });
    }

    // ── PANIER ───────────────────────────────────────
    function updateCartDisplay() {
        const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
        const total      = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        document.getElementById('cart-count').textContent = totalItems;

        const list = document.getElementById('cart-items');
        if (list) {
            list.innerHTML = cart.map((item, idx) => `
                <li class="cart-item">
                    <img src="${esc(item.img)}" alt="${esc(item.name)}" class="cart-item-img">
                    <div class="cart-item-details">
                        <h4>${esc(item.name)}</h4>
                        <p>${Number(item.price).toLocaleString('fr-FR')} FCFA</p>
                        <div class="cart-item-quantity">Quantité : ${item.quantity}</div>
                    </div>
                    <button class="remove-item" data-index="${idx}">&times;</button>
                </li>
            `).join('');
            document.querySelectorAll('.remove-item').forEach(btn => {
                btn.addEventListener('click', e => {
                    cart.splice(parseInt(e.target.dataset.index), 1);
                    updateCartDisplay();
                });
            });
        }

        const totalDiv = document.getElementById('cart-total');
        if (totalDiv) totalDiv.textContent = `Total : ${Number(total).toLocaleString('fr-FR')} FCFA`;
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    function showNotification(item) {
        const notif = document.getElementById('cart-notification');
        document.getElementById('notification-img').src = item.img;
        document.getElementById('notification-message').textContent = `${item.name} a été ajouté au panier !`;
        notif.classList.add('visible');
        setTimeout(() => notif.classList.remove('visible'), 3000);
    }

    // ── MODAL PANIER ─────────────────────────────────
    document.getElementById('cart-button').addEventListener('click', () => {
        updateCartDisplay();
        document.getElementById('cart-modal').style.display = 'block';
    });
    document.querySelector('.close-button').addEventListener('click', () => {
        document.getElementById('cart-modal').style.display = 'none';
    });
    document.getElementById('checkout-button').addEventListener('click', () => {
        if (!cart.length) { alert('Votre panier est vide.'); return; }
        const whatsapp = "22870445866"; // 🔧 VOTRE NUMÉRO WHATSAPP
        let msg = "Salut ! 👋 J'aimerais passer la commande suivante :\n\n";
        let total = 0;
        cart.forEach(i => { msg += `🛒 ${i.name} x${i.quantity} - ${i.price * i.quantity} FCFA\n`; total += i.price * i.quantity; });
        msg += `\n💰 Total : ${total} FCFA\n\nMerci de me donner les détails de la livraison et du paiement ! 🙏`;
        window.location.href = `https://wa.me/${whatsapp}?text=${encodeURIComponent(msg)}`;
    });

    // ── UTILITAIRE XSS ───────────────────────────────
    function esc(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    updateCartDisplay();
</script>

<script src="script.js"></script>
</body>
</html>
